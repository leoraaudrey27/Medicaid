<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Signup MedicAid</title>
     <title class="text-warning">MedicAid</title>
    <link rel="stylesheet" href="css/bootstrap.css">
    <script src="js/bootstrap.js"></script>
    
</head>
<body class="bg-dark">
    <!-- signup page -->
     <!-- name of company -->
    

            <!-- sign up page -->
            
             <!-- name of company -->
              <section class="row justify-content-center">
                <!-- col-1 -->
                <div class="col-md-6">
                    <!-- name of company,image -->
                     <div class="text-center text-light m-5">
                        <h2>MedicAid</h2>
                        <p>Welcome to <i>MedicAid</i> </p>
                        <div>
                            <img src="images/medicaid.png" alt="company group photo" class="img-fluid mt-4" style="width: 260px; border-radius: 200px; height: 240;">
                        </div>
                     </div>


                </div>
                 <!-- end of col-1 -->

                 <!-- col-2 -->
                  <div class="col-md-6 p-3">
                    <!-- signup section -->
                     <div class="text-center m-3">
                        <!-- card contains our signup input fields -->
                         <!--name,password,email, telephone -->
                         <div class="card shadow ">
                            <div class="card-header text-center text-light bg-warning">
                                <h4>Create Account</h4>
                            </div>
                            <!-- card body -->
                             <div class="card-body">
                                <!-- form to carry the input fields -->
                                 <form >
                                    <div class="mb-3">
                                        <label for="">Full Name</label>
                                        <br>
                                        <input type="text" placeholder="Enter Full Name" class="form-control">
                                    </div>

                                    <div class="mb-3">
                                        <label for="">Email</label>
                                        <br>
                                        <input type="email" placeholder="Enter Email" class="form-control">
                                    </div>
                                    <div class="mb-3">
                                        <label for="">Telephone</label>
                                        <br>
                                        <input type="tel " placeholder="Enter Phone Number" class="form-control">
                                    </div>
                                    <div class="mb-3">
                                        <label for="">Password</label>
                                        <br>
                                        <input type="password" placeholder="Enter Password" class="form-control">
                                    </div>
                                    <div class="mb-3">
                                        <label for="">Confirm Password</label>
                                        <br>
                                        <input type="password" placeholder="Confirm Password" class="form-control">
                                     </div>
                                     <!-- button -->
                                      <div class="d-grid">
                                        <button class="btn btn-warning text-light">Sign In</button>
                                      </div>
                                        
                                    </div>
                                 </form>
                                 <p class="text-center mt-3">
                                    Already have an account? <a href="signin.html"> Sign In</a>
                                 </p>

                                 <a href="index.html" class="text-start">Home -></a>
                                 <br>
                             </div>
                         </div>
                     </div>
                  
                  <!-- end of col-2 -->
              </section>

                </div>
            </div>

        </div>
    </div>
</div>

</body>

</html>
