<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In MedicAid</title>
    <!-- link the bootstrap files -->
    <link rel="stylesheet" href="css/bootstrap.css">
    <script src="js/bootstrap.js"></script>
</head>
<body class="bg-dark">
    <section class="row">
        <div class="col-6 offset-3">
            <!-- card -->
             <div>
             <div class="card">
                <div class="card-header">
                    <h4>Sign In</h4>
                </div>
                <div class="card-body">
                    <!-- user to enter email or phone number and password to login -->
                     <form >
                        <div class="mb-3">
                        <input type="text" placeholder="Enter Email or Phone" class="form-control">
                     </div>
                     <div class="mb-3">
                        <input type="password" placeholder="Enter Password" class="form-control">
                     </div>
                     <button class="btn btn-primary w-100 login-btn">Log In</button>
                             </div>
                     </form>

                     <p class="text-center m-3">
                        <a href="" class="text-primary">Forgot Password?</a>
                     </p>

                     <a href="signup.html">
                        <span class="btn btn-outline-primary w-100">Create new account</span>
                     </a>
                     <br>
                     
             </div>
             </div>
        </div>
    </section>
</body>
</html>
